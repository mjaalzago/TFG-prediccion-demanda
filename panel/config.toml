# Configuración del panel de predicción de demanda.
# Edita este fichero para adaptar el panel a un restaurante concreto
# o a un nuevo entrenamiento del modelo.
#
# Las métricas de evaluación se obtienen de la validación cruzada
# realizada en los notebooks 3 y 4. Si se reentrenan los modelos,
# actualiza los valores de la sección [metricas].

# 
# Información del modelo entrenado
[modelo]
# Periodo de entrenamiento (formato ISO: YYYY-MM-DD)
inicio_entrenamiento = "2016-09-01"
fin_entrenamiento = "2019-08-03"

# 
# Métricas de evaluación de los modelos en validación cruzada
[metricas.prophet_corto]
horizonte_dias = 14
mae = 3.83
rmse = 4.91
mape = 27.12

[metricas.prophet_medio]
horizonte_dias = 30
mae = 4.43
rmse = 6.53
mape = 27.63

[metricas.sarima_corto]
horizonte_dias = 14
mae = 4.58
rmse = 5.71
mape = 37.59

[metricas.sarima_medio]
horizonte_dias = 30
mae = 5.12
rmse = 6.61
mape = 41.95

# 
# Configuración del restaurante
[restaurante]
# Código de país y subdivisión para la librería holidays
pais = "GB"
subdivision = "ENG"

# Coordenadas para la API de Open-Meteo
latitud = 51.5074
longitud = -0.1278

# Zona horaria para la API de Open-Meteo (formato IANA)
zona_horaria = "Europe/London"

# Valores medios de fallback para los regresores meteorológicos
# del modelo de corto plazo (cuando la API no está disponible o
# se solicita una fecha sin previsión disponible).
# Estos valores deben reflejar la climatología media del lugar
# del restaurante.
temp_media_dia = 11.5      # Temperatura media diaria (°C)
viento_medio_serv = 12.0   # Viento medio en franja de servicio (km/h)
nubosidad_media_dia = 70.0 # Nubosidad media diaria (%)

# 
# Configuración de la lógica de fiabilidad
[fiabilidad]
# Días desde el fin del entrenamiento para clasificar la fiabilidad
# de las predicciones en el panel del gestor.
umbral_verde_dias = 30
umbral_ambar_dias = 180

# 
# Festivos locales adicionales
# 
# Festivos específicos del municipio o del establecimiento que no
# están recogidos en el calendario nacional. Cada entrada se define
# con la fecha en formato ISO (YYYY-MM-DD) y un nombre descriptivo.
# Se incorporan al modelo y al panel junto con los festivos
# nacionales.
#
# En el caso de estudio (Londres, Inglaterra) no se han identificado
# festivos locales relevantes. Para añadir nuevos festivos, descomente
# las líneas de ejemplo y modifíquelas según corresponda.


# 
# Festivos personalizados
# 
# Festividades adicionales no recogidas en el calendario oficial
# del país (librería holidays). Pueden ser de dos tipos:
# 
# - Festivos locales municipales no incluidos en la subdivisión
#   regional (San Isidro en Madrid, Virgen de la Almudena, etc.).
# - Festividades sociales recurrentes con efecto demostrado sobre
#   la demanda del restaurante (San Valentín, Mother's Day,
#   Nochebuena, Nochevieja, Black Friday...).
# 
# La fecha admite dos formatos:
#   - "MM-DD": fecha fija recurrente anual (San Valentín, Nochebuena).
#     El sistema la aplica automáticamente a todos los años.
#   - "YYYY-MM-DD": fecha específica de un año concreto, útil para
#     festividades de fecha variable como Mother's Day UK 
#     (cuarto domingo de Cuaresma).

# San Valentín (recurrente)
[[festivos_personalizados]]
fecha = "02-14"
nombre = "Valentine's Day"

# Nochebuena (recurrente)
[[festivos_personalizados]]
fecha = "12-24"
nombre = "Christmas Eve"

# Nochevieja (recurrente)
[[festivos_personalizados]]
fecha = "12-31"
nombre = "New Year's Eve"

# Mother's Day UK (cuarto domingo de Cuaresma, fecha variable)
[[festivos_personalizados]]
fecha = "2016-03-06"
nombre = "Mother's Day"

[[festivos_personalizados]]
fecha = "2017-03-26"
nombre = "Mother's Day"

[[festivos_personalizados]]
fecha = "2018-03-11"
nombre = "Mother's Day"

[[festivos_personalizados]]
fecha = "2019-03-31"
nombre = "Mother's Day"

[[festivos_personalizados]]
fecha = "2020-03-22"
nombre = "Mother's Day"

[[festivos_personalizados]]
fecha = "2021-03-14"
nombre = "Mother's Day"

[[festivos_personalizados]]
fecha = "2022-03-27"
nombre = "Mother's Day"

[[festivos_personalizados]]
